name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so clang-tidy can diff changed files vs the base
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 clang-tidy-17 \
            libssl-dev libcurl4-openssl-dev libicu-dev python3-dev python3-pip
          pip install --break-system-packages pybind11
      - name: Build SQLite 3.46 from amalgamation (ubuntu apt ships 3.45 < required 3.46)
        run: |
          SQLITE_VER=3460100   # 3.46.1
          curl -fsSL "https://sqlite.org/2024/sqlite-autoconf-${SQLITE_VER}.tar.gz" -o /tmp/sqlite.tar.gz
          tar -xzf /tmp/sqlite.tar.gz -C /tmp
          cd "/tmp/sqlite-autoconf-${SQLITE_VER}"
          ./configure --prefix=/usr/local && make -j"$(nproc)" && sudo make install
          sudo ldconfig
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DSTARLING_BUILD_PYTHON=ON \
            -DSQLite3_INCLUDE_DIR=/usr/local/include \
            -DSQLite3_LIBRARY=/usr/local/lib/libsqlite3.so \
            -Dpybind11_DIR="$(python3 -c 'import pybind11; print(pybind11.get_cmake_dir())')"
        env:
          CC: clang-17
          CXX: clang++-17
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy (changed files only)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Incremental adoption: lint only the C++ files this change touches, vs its
          # base. The existing tree has never been clang-tidy-clean (CI configure never
          # passed until now), so gating the whole codebase would block every PR on a
          # pre-existing backlog. New/changed .cpp is held to .clang-tidy
          # (WarningsAsErrors); header-only diagnostics surface via their .cpp includers.
          # The full-tree cleanup is tracked separately.
          if [ "$EVENT_NAME" = "pull_request" ]; then BASE="$PR_BASE_SHA"; else BASE="$PUSH_BEFORE_SHA"; fi
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "No base ref to diff against — skipping (clang-tidy gates changed files only)."
            exit 0
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "${BASE}...HEAD" -- src bindings \
            | grep -E '\.cpp$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed C++ source files to lint."
            exit 0
          fi
          echo "clang-tidy on changed files:"; echo "$CHANGED"
          printf '%s\n' "$CHANGED" | xargs -r -P "$(nproc)" -n 1 clang-tidy-17 -p build

  python-test:
    runs-on: ubuntu-24.04
    needs: cpp-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The editable install builds the _core C++ extension, so python-test needs
      # the same native deps as cpp-build-test (SQLite >= 3.46, OpenSSL, CURL, ICU).
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 libssl-dev libcurl4-openssl-dev libicu-dev
      - name: Build SQLite 3.46 from amalgamation (ubuntu apt ships 3.45 < required 3.46)
        run: |
          SQLITE_VER=3460100   # 3.46.1
          curl -fsSL "https://sqlite.org/2024/sqlite-autoconf-${SQLITE_VER}.tar.gz" -o /tmp/sqlite.tar.gz
          tar -xzf /tmp/sqlite.tar.gz -C /tmp
          cd "/tmp/sqlite-autoconf-${SQLITE_VER}"
          ./configure --prefix=/usr/local && make -j"$(nproc)" && sudo make install
          sudo ldconfig
      - name: Install
        env:
          CC: clang-17
          CXX: clang++-17
          CMAKE_ARGS: "-DSQLite3_INCLUDE_DIR=/usr/local/include -DSQLite3_LIBRARY=/usr/local/lib/libsqlite3.so"
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest

  static-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run defense-line #1
        run: python scripts/ci_static_scan.py
