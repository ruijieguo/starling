name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so clang-tidy can diff changed files vs the base
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 clang-tidy-17 \
            libssl-dev libcurl4-openssl-dev libicu-dev python3-dev python3-pip
          pip install --break-system-packages pybind11
      - name: Build SQLite 3.46 from amalgamation (ubuntu apt ships 3.45 < required 3.46)
        run: |
          SQLITE_VER=3460100   # 3.46.1
          curl -fsSL "https://sqlite.org/2024/sqlite-autoconf-${SQLITE_VER}.tar.gz" -o /tmp/sqlite.tar.gz
          tar -xzf /tmp/sqlite.tar.gz -C /tmp
          cd "/tmp/sqlite-autoconf-${SQLITE_VER}"
          ./configure --prefix=/usr/local && make -j"$(nproc)" && sudo make install
          sudo ldconfig
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DSTARLING_BUILD_PYTHON=ON \
            -DSQLite3_INCLUDE_DIR=/usr/local/include \
            -DSQLite3_LIBRARY=/usr/local/lib/libsqlite3.so \
            -Dpybind11_DIR="$(python3 -c 'import pybind11; print(pybind11.get_cmake_dir())')"
        env:
          CC: clang-17
          CXX: clang++-17
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy (changed lines only)
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CLANG_TIDY: clang-tidy-17
        run: |
          # Incremental adoption: gate only the *lines* this change touches, vs its
          # base. The tree has never been clang-tidy-clean, and .clang-tidy's
          # HeaderFilterRegex means linting a changed .cpp would otherwise surface
          # every advisory in the starling headers it includes — failing the PR on
          # debt that isn't its own. ci_clang_tidy_diff.py builds a -line-filter from
          # the diff so only NEW diagnostics on changed lines fail. Full-tree cleanup
          # is tracked separately. (See scripts/ci_clang_tidy_diff.py for the why.)
          if [ "$EVENT_NAME" = "pull_request" ]; then BASE="$PR_BASE_SHA"; else BASE="$PUSH_BEFORE_SHA"; fi
          python3 scripts/ci_clang_tidy_diff.py "$BASE" build

  python-test:
    runs-on: ubuntu-24.04
    needs: cpp-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The editable install builds the _core C++ extension, so python-test needs
      # the same native deps as cpp-build-test (SQLite >= 3.46, OpenSSL, CURL, ICU).
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 libssl-dev libcurl4-openssl-dev libicu-dev
      - name: Build SQLite 3.46 from amalgamation (ubuntu apt ships 3.45 < required 3.46)
        run: |
          SQLITE_VER=3460100   # 3.46.1
          curl -fsSL "https://sqlite.org/2024/sqlite-autoconf-${SQLITE_VER}.tar.gz" -o /tmp/sqlite.tar.gz
          tar -xzf /tmp/sqlite.tar.gz -C /tmp
          cd "/tmp/sqlite-autoconf-${SQLITE_VER}"
          ./configure --prefix=/usr/local && make -j"$(nproc)" && sudo make install
          sudo ldconfig
      - name: Install
        env:
          CC: clang-17
          CXX: clang++-17
          CMAKE_ARGS: "-DSQLite3_INCLUDE_DIR=/usr/local/include -DSQLite3_LIBRARY=/usr/local/lib/libsqlite3.so"
        run: pip install -e ".[dev,dashboard]"   # dashboard extra = fastapi/uvicorn/httpx (dashboard tests import them)
      - name: pytest
        run: python -m pytest   # `python -m` puts the repo root on sys.path so tests that import `scripts` resolve

  static-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run defense-line #1
        run: python scripts/ci_static_scan.py
