name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-17 clang-tidy-17
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
        env:
          CC: clang-17
          CXX: clang++-17
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: clang-tidy
        run: |
          find src include bindings \( -name '*.cpp' -o -name '*.hpp' \) -print0 | \
            xargs -0 -r clang-tidy-17 -p build

  python-test:
    runs-on: ubuntu-24.04
    needs: cpp-build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest

  static-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run defense-line #1
        run: python scripts/ci_static_scan.py
