<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Pre-paint theme: set <html data-theme> from the saved choice (system→OS)
			// before first render to avoid a flash of the wrong theme.
			try {
				var t = localStorage.getItem('starling_theme') || 'system';
				var d = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
				document.documentElement.dataset.theme = d ? 'dark' : 'light';
			} catch (e) {}
			// Pre-paint density: set <html data-density> from the saved choice
			// before first render so a saved "compact" choice doesn't flash a
			// row-height jump on load (mirrors the theme pre-paint above).
			try {
				var den = localStorage.getItem('starling_density');
				if (den === 'compact') document.documentElement.dataset.density = 'compact';
			} catch (e) {}
		</script>
%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
